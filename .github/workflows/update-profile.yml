name: Update Profile Live

on:
  schedule:
    - cron: '* * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update live activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/workflows/update_profile.py

      - name: Commit changes
        if: success()
        run: |
          git config user.name "B E R U Bot"
          git config user.email "berucrypt02@gmail.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "profile: live activity update" && git push)
