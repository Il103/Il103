name: Update Profile Live

on:
  schedule:
    - cron: '*/2 * * * *'
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/workflows/update_profile.py

      - name: Commit and push
        run: |
          git config user.name "B E R U Bot"
          git config user.email "berucrypt02@gmail.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "profile: auto-update"
            git push
          fi
